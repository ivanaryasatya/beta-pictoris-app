<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot 3D Model Viewer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="js/transition.js"></script>
    <style>
        body {
            overflow: hidden;
            margin: 0;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #viewer-container {
            width: 100vw;
            height: 100vh;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .back-btn {
            background: rgba(15, 23, 42, 0.8);
            color: #22d3ee;
            border: 1px solid #22d3ee;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            background: #22d3ee;
            color: #0f172a;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
        }

        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #94a3b8;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 20px;
            border-radius: 30px;
            pointer-events: none;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <div class="ui-overlay">
        <a href="index.html" class="back-btn">⬅ Back to Home</a>
    </div>

    <div class="controls-info">
        Left Click: Rotate • Right Click: Pan • Scroll: Zoom
    </div>

    <div id="viewer-container"></div>

    <script>
        // Setup Scene
        const container = document.getElementById('viewer-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0f172a, 0.02);

        // Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 4, 6);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 20;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        const fillLight = new THREE.PointLight(0x8b5cf6, 1, 10);
        fillLight.position.set(-5, 2, -5);
        scene.add(fillLight);

        const rimLight = new THREE.SpotLight(0x22d3ee, 5);
        rimLight.position.set(0, 10, -5);
        rimLight.lookAt(0, 0, 0);
        scene.add(rimLight);

        // Grid
        const gridHelper = new THREE.GridHelper(20, 20, 0x334155, 0x1e293b);
        scene.add(gridHelper);

        // Loading Manager for Progress Bar
        const loadingManager = new THREE.LoadingManager();
        const progressBar = document.createElement('div');
        progressBar.style.cssText = "position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;";
        const progressFill = document.createElement('div');
        progressFill.style.cssText = "width: 0%; height: 100%; background: #22d3ee; transition: width 0.2s; border-radius: 2px;";
        progressBar.appendChild(progressFill);
        document.body.appendChild(progressBar);

        loadingManager.onProgress = (url, loaded, total) => {
            const percent = (loaded / total) * 100;
            progressFill.style.width = percent + "%";
        };

        loadingManager.onLoad = () => {
            progressFill.style.width = "100%";
            setTimeout(() => {
                progressBar.style.opacity = "0";
            }, 500);
        };

        // Load GLB
        const loader = new THREE.GLTFLoader(loadingManager);
        let robotScene = null;

        loader.load('robot.glb', function (gltf) {
            robotScene = gltf.scene;

            // Adjust Scale / Position automatically
            const box = new THREE.Box3().setFromObject(robotScene);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            // Normalize size to fit in ~3 units
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 3 / maxDim;
            robotScene.scale.setScalar(scale);

            // Center object
            robotScene.position.sub(center.multiplyScalar(scale));
            robotScene.position.y += size.y * scale / 2; // Sit on grid

            // Enable shadows
            robotScene.traverse(function (node) {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                }
            });

            scene.add(robotScene);

        }, undefined, function (error) {
            console.error(error);
            const msg = document.createElement('div');
            msg.innerText = "Info: 'robot.glb' not found. Using placeholder.";
            msg.style.cssText = "position: absolute; top: 10%; left: 50%; transform: translateX(-50%); color: #fbbf24; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; font-size: 0.9rem;";
            document.body.appendChild(msg);

            // Fallback: Show a placeholder group (Constructed Robot)
            robotScene = new THREE.Group();

            // Simple constructed robot materials
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0x06b6d4, shininess: 100 });
            const wheelMat = new THREE.MeshPhongMaterial({ color: 0x111111 });

            const chassis = new THREE.Mesh(new THREE.BoxGeometry(1, 0.4, 1.5), bodyMat);
            chassis.position.y = 0.4;
            chassis.castShadow = true;
            robotScene.add(chassis);

            const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 32);
            const wheelPositions = [[-0.6, 0.3, 0.5], [0.6, 0.3, 0.5], [-0.6, 0.3, -0.5], [0.6, 0.3, -0.5]];

            wheelPositions.forEach(pos => {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.z = Math.PI / 2;
                w.position.set(...pos);
                w.castShadow = true;
                robotScene.add(w);
            });

            scene.add(robotScene);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
